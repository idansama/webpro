<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Kareem 1447H</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-dark text-white">

    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center text-center p-3 p-md-5" 
         style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://png.pngtree.com/background/20210717/original/pngtree-yellow-islamic-background-eid-mubarak-ramadan-kareem-picture-image_1418582.jpg') center/cover no-repeat;">
        
        <div class="row justify-content-center w-100">
            <div class="col-12 col-md-10 col-lg-8 border border-warning p-4 p-md-5 rounded-5 shadow-lg bg-dark bg-opacity-75">
                
                <i class="bi bi-moon-stars-fill text-warning display-1 mb-4 d-block"></i>
                
                <h1 class="display-3 fw-bold text-warning mb-3">Ramadan Kareem</h1>
                <p class="fs-4 mb-5 px-md-5 italic">"Selamat menunaikan ibadah puasa 1447 H. Semoga bulan ini penuh keberkahan dan kedamaian."</p>
                
                <div class="row g-3 mb-5 justify-content-center text-uppercase small fw-bold">
                    <div class="col-6 col-sm-3">
                        <div class="p-3 border border-warning rounded-4 shadow-sm bg-black bg-opacity-25">
                            <div class="text-white-50 mb-1">Imsak</div>
                            <div class="text-warning fs-4">04:30</div>
                        </div>
                    </div>
                    <div class="col-6 col-sm-3">
                        <div class="p-3 border border-warning rounded-4 shadow-sm bg-black bg-opacity-25">
                            <div class="text-white-50 mb-1">Maghrib</div>
                            <div class="text-warning fs-4">18:05</div>
                        </div>
                    </div>
                    <div class="col-6 col-sm-3">
                        <div class="p-3 border border-warning rounded-4 shadow-sm bg-black bg-opacity-25">
                            <div class="text-white-50 mb-1">Zakat</div>
                            <div class="text-warning fs-4">Fitrah</div>
                        </div>
                    </div>
                    <div class="col-6 col-sm-3">
                        <div class="p-3 border border-warning rounded-4 shadow-sm bg-black bg-opacity-25">
                            <div class="text-white-50 mb-1">Hari Ke</div>
                            <div class="text-warning fs-4">30</div>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn btn-warning btn-lg px-5 py-3 fw-bolder shadow-lg rounded-pill" data-bs-toggle="modal" data-bs-target="#thrModal">
                    <i class="bi bi-gift-fill me-2"></i> KLAIM THR ANDA
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="thrModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-success border-warning border-3 shadow-lg">
                <div class="modal-body text-center p-5">
                    <div class="text-end mt-n4 me-n4">
                         <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <i class="bi bi-cash-coin display-1 text-warning mb-4"></i>
                    <h2 class="fw-bolder text-white">MUBARAK!</h2>
                    <p class="text-white fs-5 mb-4">Selamat, Anda berhak mendapatkan:</p>
                    <div class="bg-white text-success p-3 rounded-4 fw-black display-6 mb-4 shadow">
                        RP 1.000.000
                    </div>
                    <p class="small text-white-50">Saldo akan dikirimkan langsung ke <br><strong>Rekening Akhirat</strong> Anda.</p>
                    <button type="button" class="btn btn-warning w-100 fw-bold mt-3 py-2 rounded-pill" data-bs-dismiss="modal">Alhamdulillah!</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
